name: Daily GitHub Hot Projects

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Shanghai = 01:00 UTC
    - cron: "0 1 * * *"

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Send digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY || secrets.OPENAI_API_KEY }}
          AI_BASE_URL: ${{ vars.AI_BASE_URL || 'https://api.openai.com/v1' }}
          AI_MODEL: ${{ vars.AI_MODEL || vars.OPENAI_MODEL || 'auto' }}
          AI_MODEL_PREFERENCES: ${{ vars.AI_MODEL_PREFERENCES || 'gpt-4.1-mini,gpt-4.1,gpt-4o-mini,gpt-4o,deepseek-chat,qwen-plus,qwen-turbo,glm-4-flash,moonshot-v1-8k' }}
          SERVER_CHAN_SEND_KEY: ${{ secrets.SERVER_CHAN_SEND_KEY }}
          TRENDING_LANGUAGE: ${{ vars.TRENDING_LANGUAGE }}
          PROJECT_LIMIT: ${{ vars.PROJECT_LIMIT || '10' }}
          README_CHARS: ${{ vars.README_CHARS || '8000' }}
          SERVER_CHAN_PREVIEW_CHARS: ${{ vars.SERVER_CHAN_PREVIEW_CHARS || '1800' }}
          SEND_DRY_RUN: ${{ vars.SEND_DRY_RUN || 'false' }}
        run: python src/main.py
